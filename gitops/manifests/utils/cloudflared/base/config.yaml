tunnel: cloudflared-tunnel
credentials-file: /etc/cloudflared/credentials.json
ingress:
  - hostname: pi-argo.learndevops.site
    service: http://argocd-server.argocd.svc.cluster.local:80
    originRequest:
      http2Origin: true
      noTLSVerify: true

  - hostname: web.learndevops.site
    service: http://devsecops-api.devsecops-app.svc.cluster.local:80
    originRequest:
      httpHostHeader: devsecops-api.devsecops-app.svc.cluster.local

  # OWASP Juice Shop — intentionally vulnerable, do not expose without auth
  # Consider adding Cloudflare Access policy on this hostname in the
  # Cloudflare dashboard to restrict who can reach it.
  - hostname: juice.learndevops.site
    service: http://juice-shop.juice-shop.svc.cluster.local:80
    originRequest:
      httpHostHeader: juice-shop.juice-shop.svc.cluster.local

# Grafana — for monitoring dashboards. Also protected by Cloudflare Access. (Internal purpose only, not for public demo.)
  - hostname: grafana.learndevops.site
    service: http://kube-prometheus-grafana.monitoring.svc.cluster.local:80
    originRequest:
      httpHostHeader: kube-prometheus-grafana.monitoring.svc.cluster.local

  - service: http_status:404