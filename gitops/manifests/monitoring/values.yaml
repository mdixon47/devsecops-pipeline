# gitops/manifests/monitoring/values.yaml
#
# kube-prometheus-stack values tuned for Raspberry Pi 5 (ARM64, 8GB RAM).
# Aggressive resource trimming — the Pi also runs the app and Traefik.
#

grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password      # override with a Kubernetes Secret in production
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: false              # stateless for now — dashboards loaded via configmap
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    # Only scrape ServiceMonitors in the same namespace or matching label
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    retention: 7d
    retentionSize: 2GB
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 300m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi     # keep small on Pi SD card / SSD

alertmanager:
  enabled: true
  
  # Configuration for the Slack "Modern App" Webhook
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-notifications'
    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - channel: '#alerts-k3s'
        # Modern way: pointing to the secret file we will mount below
        api_url_file: '/etc/alertmanager/secrets/slack-webhook/api-url' 
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
    - name: 'null'

  # Your existing Resource Limits + the Secret Mounting
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m
    # This part tells Kubernetes to take your Secret and plug it into the pod
    secrets:
      - slack-webhook

# Disable components that are heavy and not needed on a single-node Pi
kubeEtcd:
  enabled: false               # k3s uses sqlite not etcd
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

# Node exporter — keep it, it's lightweight and shows Pi system metrics
nodeExporter:
  enabled: true

# kube-state-metrics — keep it, powers most Grafana dashboards
kubeStateMetrics:
  enabled: true