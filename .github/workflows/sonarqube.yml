name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Avoid running multiple scans for the same ref simultaneously
concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Disable shallow clone so SonarQube can compute accurate
          # blame information for new code detection.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # Project configuration is read from sonar-project.properties
          # at the repository root. Additional args can be passed below.
          args: >
            -Dsonar.qualitygate.wait=true

      # Optional: surface scan metadata as a job summary.
      - name: Publish scan summary
        if: always()
        run: |
          echo "### SonarQube Scan Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host: \`${{ secrets.SONAR_HOST_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch / PR: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f .scannerwork/report-task.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Report metadata:**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat .scannerwork/report-task.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
